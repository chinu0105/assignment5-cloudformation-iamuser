AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Assignment 5 — Creates an IAM User, assigns it to the
  "Contractors" Group with EC2, S3 and EKS access policy.

# ─────────────────────────────────────────────────────────────
# PARAMETERS — change these at deploy time without editing file
# ─────────────────────────────────────────────────────────────
Parameters:

  IAMUserName:
    Type: String
    Default: contractor-user
    Description: Name of the IAM user to create

  Environment:
    Type: String
    Default: dev
    AllowedValues: [ dev, staging, prod ]
    Description: Environment tag

# ─────────────────────────────────────────────────────────────
# RESOURCES — what gets created on AWS
# ─────────────────────────────────────────────────────────────
Resources:

  # ── 1. Policy — defines what Contractors are allowed to do ──
  ContractorsPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: ContractorsAccessPolicy
      Description: Grants EC2, S3 and EKS access to Contractors
      PolicyDocument:
        Version: '2012-10-17'
        Statement:

          # EC2 — read only (list and describe instances)
          - Sid: EC2Access
            Effect: Allow
            Action:
              - ec2:Describe*
              - ec2:List*
              - ec2:StartInstances
              - ec2:StopInstances
            Resource: '*'

          # S3 — read and write objects
          - Sid: S3Access
            Effect: Allow
            Action:
              - s3:ListAllMyBuckets
              - s3:ListBucket
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
            Resource: '*'

          # EKS — read cluster info and get kubeconfig
          - Sid: EKSAccess
            Effect: Allow
            Action:
              - eks:DescribeCluster
              - eks:ListClusters
              - eks:ListNodegroups
              - eks:DescribeNodegroup
              - eks:AccessKubernetesApi
            Resource: '*'

          # Safety guardrail — block IAM privilege escalation
          - Sid: DenyIAMEscalation
            Effect: Deny
            Action:
              - iam:CreateUser
              - iam:DeleteUser
              - iam:AttachUserPolicy
              - iam:PassRole
            Resource: '*'

  # ── 2. Group — "Contractors" with policy attached ───────────
  ContractorsGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: Contractors
      ManagedPolicyArns:
        - !Ref ContractorsPolicy   # attach the policy above

  # ── 3. User — created and added to Contractors group ────────
  ContractorUser:
    Type: AWS::IAM::User
    Properties:
      UserName: !Ref IAMUserName
      Groups:
        - !Ref ContractorsGroup    # user joins the group
      Tags:
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: ContractorAccess

# ─────────────────────────────────────────────────────────────
# OUTPUTS — shown after stack is created
# ─────────────────────────────────────────────────────────────
Outputs:

  IAMUserName:
    Description: The IAM user that was created
    Value: !Ref ContractorUser

  IAMUserArn:
    Description: ARN of the IAM user
    Value: !GetAtt ContractorUser.Arn

  GroupName:
    Description: The group the user was added to
    Value: !Ref ContractorsGroup

  PolicyArn:
    Description: ARN of the policy attached to the group
    Value: !Ref ContractorsPolicy